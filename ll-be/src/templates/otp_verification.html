<!DOCTYPE html>
<html>
<head>
    <style>
        .container { font-family: sans-serif; max-width: 600px; margin: auto; padding: 20px; border: 1px solid #eee; }
        .header { background: #4F46E5; color: white; padding: 10px; text-align: center; border-radius: 5px 5px 0 0; }
        .content { padding: 20px; text-align: center; }
        .otp { font-size: 32px; font-weight: bold; letter-spacing: 5px; color: #4F46E5; margin: 20px 0; }
        .footer { font-size: 12px; color: #777; text-align: center; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Verification Code</h1>
        </div>
        <div class="content">
            <p>Hello,</p>
            <p>Your verification code for <strong>AI Lesson Planning Platform</strong> is:</p>
            <div class="otp">{{ otp_code }}</div>
            <p>This code will expire in 10 minutes. If you did not request this code, please ignore this email.</p>
        </div>
        <div class="footer">
            &copy; {{ year }} AI Lesson Planning Platform. All rights reserved.
        </div>
    </div>
</body>
</html>
